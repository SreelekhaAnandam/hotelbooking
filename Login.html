<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – Hotel Booking System</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <div class="container">
      <a href="index.html"><div class="logo">Hotel Booking</div></a>
      <nav>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="rooms.html">Rooms</a></li>
          <li><a href="searchhotels.html">Search</a></li>
          <li><a href="contact.html">Contact</a></li>
          <li><a href="login.html" class="active">Login</a></li>
          <li><a href="register.html" class="btn-nav">Register</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <section class="auth-page">
    <div class="auth-bg"></div>
    <div class="auth-card">
      <div class="auth-logo">Hotel Booking</div>
      <h2>Welcome Back</h2>
      <p class="subtitle">Sign in to access your bookings and profile</p>

      <form class="auth-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn-full">Sign In</button>
      </form>

      <div class="divider">or</div>

      <div class="auth-footer">
        <p>Don't have an account? <a href="register.html">Register here</a></p>
        <p style="margin-top:0.5rem"><a href="#">Forgot password?</a></p>
      </div>
    </div>
  </section>

  <script>
    function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      if (email) {
        alert('Login successful! Welcome back.');
        window.location.href = 'index.html';
      }
    }
  </script>

</body>
</html>
