<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register – Hotel Booking System</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <div class="container">
      <a href="index.html"><div class="logo">Hotel Booking</div></a>
      <nav>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="rooms.html">Rooms</a></li>
          <li><a href="searchhotels.html">Search</a></li>
          <li><a href="contact.html">Contact</a></li>
          <li><a href="login.html">Login</a></li>
          <li><a href="register.html" class="btn-nav active">Register</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <section class="auth-page">
    <div class="auth-bg"></div>
    <div class="auth-card">
      <div class="auth-logo">Hotel Booking</div>
      <h2>Create Account</h2>
      <p class="subtitle">Join us to start booking your perfect stay</p>

      <form class="auth-form" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="name" placeholder="John Doe" required>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="Create a strong password" required>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="confirm" placeholder="Re-enter your password" required>
        </div>
        <div id="reg-msg"></div>
        <button type="submit" class="btn-full">Create Account</button>
      </form>

      <div class="divider">or</div>

      <div class="auth-footer">
        <p>Already have an account? <a href="login.html">Login here</a></p>
      </div>
    </div>
  </section>

  <script>
    function handleRegister(e) {
      e.preventDefault();
      const pw = document.getElementById('password').value;
      const cf = document.getElementById('confirm').value;
      const msg = document.getElementById('reg-msg');
      if (pw !== cf) {
        msg.innerHTML = '<div class="alert alert-error">Passwords do not match.</div>';
        return;
      }
      msg.innerHTML = '<div class="alert alert-success">Account created successfully!</div>';
      setTimeout(() => window.location.href = 'login.html', 1500);
    }
  </script>

</body>
</html>
